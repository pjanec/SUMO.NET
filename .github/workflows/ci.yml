# Offline parity gate on every push / PR: build the solution and run the hermetic test suite (no SUMO,
# no network). This is the same `dotnet test` loop CLAUDE.md defines as the correctness anchor, plus the
# Sim.Bench determinism hash check.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Traffic.sln

      - name: Build (Release)
        run: dotnet build Traffic.sln -c Release --no-restore

      - name: Test (offline parity gate)
        run: dotnet test Traffic.sln -c Release --no-build

      # The determinism anchor must not move (single AND parallel plan).
      # Refreshed 909605E965BFFE59 -> AA6143E74072CD4C: the highway-dense bench hash moved during
      # vehicle-side work after it was last set at P2-H (116c9b5) and the constant was never updated, so
      # main itself was red against this gate. The new value is verified deterministic (par == single) and
      # SUMO-parity-green (Sim.ParityTests pass within tolerance); this is an exact self-consistency anchor,
      # not a parity-vs-SUMO check. Reproduced identically on origin/main and this branch before the update.
      - name: Determinism hash
        run: |
          out="$(dotnet run --project src/Sim.Bench -c Release --no-build)"
          echo "$out"
          echo "$out" | grep -q "hashA=AA6143E74072CD4C" || { echo "::error::single-thread determinism hash moved"; exit 1; }
          echo "$out" | grep -q "hashPar=AA6143E74072CD4C" || { echo "::error::parallel determinism hash moved"; exit 1; }
